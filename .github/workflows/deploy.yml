name: Déploiement GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

# Permissions requises pour publier sur GitHub Pages.
# Le bloc est déclaré explicitement pour ne pas dépendre du réglage
# "Workflow permissions" par défaut du dépôt.
permissions:
  contents: read
  pages: write
  id-token: write

# Une seule publication à la fois ; on n'annule pas un déploiement en cours.
concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - name: Récupérer le dépôt
        uses: actions/checkout@v4

      - name: Configurer Pages
        uses: actions/configure-pages@v5

      - name: Téléverser l'artefact du site
        uses: actions/upload-pages-artifact@v3
        with:
          # Site statique servi depuis la racine du dépôt.
          path: .

      - name: Déployer vers GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
