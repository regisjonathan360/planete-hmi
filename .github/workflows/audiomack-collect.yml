name: Collecte Audiomack Haiti

on:
  # Tous les lundis à 06:00 UTC (classement hebdomadaire)
  schedule:
    - cron: "0 6 * * 1"
  # Déclenchement manuel (onglet Actions ou via l'admin)
  workflow_dispatch:
    inputs:
      source:
        description: "Source de collecte : chart (Top Songs) ou playlist (Weekly)"
        required: false
        default: "chart"
        type: choice
        options:
          - chart
          - playlist

jobs:
  collect:
    runs-on: ubuntu-latest
    steps:
      - name: Récupérer le dépôt
        uses: actions/checkout@v4

      - name: Installer Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Installer les dépendances
        working-directory: app-next
        run: npm ci

      - name: Installer Chromium (Playwright)
        working-directory: app-next
        run: npx playwright install --with-deps chromium

      - name: Collecter 100 musiques via navigateur headless
        working-directory: app-next
        env:
          CRON_SECRET: ${{ secrets.CRON_SECRET }}
          PROD_URL: https://planete-hmi.vercel.app
          TARGET_COUNT: "100"
          SOURCE: ${{ github.event.inputs.source || 'chart' }}
        run: node scripts/collect-playwright.mjs
